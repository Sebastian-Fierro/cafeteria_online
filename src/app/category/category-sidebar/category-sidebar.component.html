<div class="list-group">
  <button 
    class="list-group-item list-group-item-action" 
    (click)="onSelectCategory(null)">
    Todas las categorías
  </button>

  <button 
    *ngFor="let category of categories" 
    class="list-group-item list-group-item-action"
    (click)="onSelectCategory(category.id)">
    {{ category.name }}
  </button>
</div>
