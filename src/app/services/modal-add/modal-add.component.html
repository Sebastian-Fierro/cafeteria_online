<!-- The Modal -->
<div class="modal" [ngStyle]="{'display':modalAddService.oculto}" tabindex="-1" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Crear Producto</h4>
        <button (click)="ocultarModalAdd()" type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        Modal body...
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <button (click)="ocultarModalAdd()" type="button" class="btn btn-danger">Cancelar</button>
      </div>

    </div>
  </div>
</div>
