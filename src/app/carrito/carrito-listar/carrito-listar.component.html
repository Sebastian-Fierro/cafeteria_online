<div>
    <h5> Mi Carrito </h5>
    <hr/>

    <div class="row">
        <div class="col-sm-9">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                    <table class="table table-bordered table-striped text-center">
                        <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Descripcion</th>
                            <th>Precio</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr *ngFor="let item of carrito">
                            <td>{{ item.name }}</td>
                            <td>{{ item.description }}</td>
                            <td>${{ item.price }}</td>
                        </tr>
                        </tbody>
                    </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-sm-3">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                    <div class="col-md-6 mx-auto text-center">
                        <h5>Resumen Compra</h5>
                        <hr />
                        <h5>Total: ${{ total }}</h5>
                        <button class="btn btn-dark">Procesar compra</button>
                    </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</div>
